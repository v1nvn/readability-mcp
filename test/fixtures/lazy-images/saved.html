<html><head><title>Lazy Image Demo</title></head><body>
<main>
  <h1>Lazy Image Demo</h1>
  <p>A data-src placeholder and a responsive picture/source container.</p>
  <p><img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" data-src="https://example.com/static/hero.jpg" alt="Hero"></p>
  <picture>
    <source srcset="https://example.com/static/chart-320.png 320w, https://example.com/static/chart-1600.png 1600w">
    <img src="/static/placeholder.gif" alt="Chart">
  </picture>
</main>
</body></html>
